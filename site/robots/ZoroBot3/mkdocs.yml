site_name: ZoroBot3
site_description: Documentación técnica del robot micromouse ZoroBot3 — STM32F4, encoders magnéticos, 4 sensores IR, ventilador de succión
site_author: robotaleh
site_url: !ENV READTHEDOCS_CANONICAL_URL
repo_name: OPRobots/ZoroBot3

theme:
  name: material
  custom_dir: docs/assets/templates
  language: es
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - scheme: slate
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
  logo: assets/imgs/opr_logo.png
  favicon: assets/imgs/favicon/favicon.ico
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - assets/js/readthedocs.js
  - assets/js/mermaid-zoom.js

extra_css:
  - assets/css/custom.css
  - assets/css/mermaid-zoom.css

exclude_docs: |
  README.md

validation:
  links:
    not_found: ignore

nav:
  - Inicio: index.md
  - Hardware: 01-hardware.md
  - Arquitectura Software: 02-software-architecture.md
  - Sensores: 03-sensors.md
  - Movimiento: 04-movement.md
  - Floodfill: 05-floodfill.md
  - Control PID: 06-control-system.md
  - Menú: 07-menu-system.md
  - Debug: 08-debug-system.md
  - Calibración: 09-calibration.md
  - EEPROM: 10-eeprom.md
  - Encoders y Giroscopio: 11-encoders-gyro.md
  - Batería y LEDs: 12-battery-leds.md
  - Simulador: 13-simulator.md
  - Cinemática: 14-kinematics.md
  - Problemas Conocidos: 15-known-issues.md
