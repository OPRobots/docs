reset_config none separate

# Sobrescribir el proc program para usar halt en lugar de reset halt.
# Necesario cuando NRST no está conectado en el ST-Link custom: SYSRESETREQ
# es inestable en OpenOCD 0.12.0 sin pin de reset hardware.
proc program { filename args } {
    set verify 0
    set reset 0
    set exit 0
    set address ""

    foreach arg $args {
        switch -- $arg {
            verify  { set verify 1 }
            reset   { set reset 1 }
            exit    { set exit 1 }
            default { set address $arg }
        }
    }

    init
    halt

    # Deshabilitar SysTick y todas las IRQs del NVIC antes de escribir flash.
    # En STM32F401 (flash banco único) no se puede leer flash durante una escritura.
    # Si SysTick u otra IRQ intenta ejecutar código de flash → PGSERR y timeout.
    # cortex_m maskisr no está disponible con transporte HLA; usamos mww directamente.
    mww 0xE000E010 0x00000000  ;# SYST_CSR:  deshabilitar SysTick
    mww 0xE000E180 0xFFFFFFFF  ;# NVIC_ICER0: deshabilitar IRQs  0-31
    mww 0xE000E184 0xFFFFFFFF  ;# NVIC_ICER1: deshabilitar IRQs 32-63
    mww 0xE000E188 0xFFFFFFFF  ;# NVIC_ICER2: deshabilitar IRQs 64-95

    if { $address ne "" } {
        flash write_image erase $filename $address
    } else {
        flash write_image erase $filename
    }

    if { $verify } { verify_image $filename }
    if { $reset }  {
        # AIRCR.VECTKEY | AIRCR.SYSRESETREQ — reset por software directo,
        # no depende de reset_config ni de NRST.
        mww 0xE000ED0C 0x05FA0004
    }
    if { $exit }   { shutdown }
}
